apiVersion: v1
kind: Service
metadata:
  name: sketchgallery-ray
  labels:
    app: sketchgallery-ray
spec:
  selector:
    app: sketchgallery-ray
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sketchgallery-ray
  labels:
    app: sketchgallery-ray
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sketchgallery-ray
  template:
    metadata:
      labels:
        app: sketchgallery-ray
    spec:
      containers:
        - name: ray-gateway
          image: sketchgallery-ray:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: GCS_BUCKET
              value: REPLACE_WITH_GCS_BUCKET
            - name: RAY_SHARED_TOKEN
              value: REPLACE_WITH_RAY_SHARED_TOKEN
            - name: CALLBACK_TIMEOUT_SEC
              value: "5"
            - name: RAY_ADDRESS
              value: "REPLACE_WITH_RAY_ADDRESS"
            - name: RAY_NAMESPACE
              value: "sketchgallery"
            - name: RAY_GET_TIMEOUT_SEC
              value: "300"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /var/secrets/google
              readOnly: true
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: gcp-sa-key
            optional: true
