apiVersion: v1
kind: Service
metadata:
  name: sketchgallery-ray
  labels:
    app: sketchgallery-ray
spec:
  selector:
    app: sketchgallery-ray
  ports:
    - name: http
      port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sketchgallery-ray
  labels:
    app: sketchgallery-ray
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sketchgallery-ray
  template:
    metadata:
      labels:
        app: sketchgallery-ray
    spec:
      containers:
        - name: ray-gateway
          image: sketchgallery-ray:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "8000"
            - name: GCS_BUCKET
              value: REPLACE_WITH_GCS_BUCKET
            - name: RAY_SHARED_TOKEN
              value: REPLACE_WITH_RAY_SHARED_TOKEN
            - name: CALLBACK_TIMEOUT_SEC
              value: "REPLACE_WITH_CALLBACK_TIMEOUT_SEC"
            - name: RAY_ADDRESS
              value: "REPLACE_WITH_RAY_ADDRESS"
            - name: RAY_NAMESPACE
              value: "REPLACE_WITH_RAY_NAMESPACE"
            - name: RAY_GET_TIMEOUT_SEC
              value: "REPLACE_WITH_RAY_GET_TIMEOUT_SEC"
            - name: HF_TOKEN
              value: "REPLACE_WITH_HF_TOKEN"
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /var/secrets/google/key.json
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          volumeMounts:
            - name: gcp-sa-key
              mountPath: /var/secrets/google
              readOnly: true
            - name: dshm
              mountPath: /dev/shm
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
            timeoutSeconds: 2
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 6
      volumes:
        - name: gcp-sa-key
          secret:
            secretName: gcp-sa-key
            optional: true
        - name: dshm
          emptyDir:
            medium: Memory
