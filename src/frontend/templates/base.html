<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}SketchGallery{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="topbar">
      <a class="logo" href="{{ url_for('ui.home') }}">SketchGallery</a>
      <nav>
        <a href="{{ url_for('ui.create') }}">Create</a>
        <a href="{{ url_for('ui.gallery') }}">Gallery</a>
      </nav>
    </header>

    <main class="page">{% block content %}{% endblock %}</main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  </body>
</html>
