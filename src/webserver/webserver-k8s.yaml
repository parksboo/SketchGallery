apiVersion: v1
kind: Service
metadata:
  name: sketchgallery-web
  labels:
    app: sketchgallery-web
spec:
  selector:
    app: sketchgallery-web
  ports:
    - name: http
      port: 5050
      targetPort: 5050
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sketchgallery-web
  labels:
    app: sketchgallery-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: sketchgallery-web
  template:
    metadata:
      labels:
        app: sketchgallery-web
    spec:
      containers:
        - name: web
          image: sketchgallery-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5050
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5050"
            - name: PGHOST
              value: postgres
            - name: PGPORT
              value: "5432"
            - name: PGDATABASE
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: PGUSER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DATAPLANE_INTERNAL_URL
              value: http://sketchgallery-dataplane:8080
            - name: DATAPLANE_PUBLIC_URL
              value: http://REPLACE_WITH_BROWSER_REACHABLE_DATAPLANE
          readinessProbe:
            httpGet:
              path: /health
              port: 5050
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 5050
            initialDelaySeconds: 15
            periodSeconds: 10
