apiVersion: v1
kind: Pod
metadata:
  name: sketchgallery-dataplane-pod
  labels:
    app: sketchgallery-dataplane
spec:
  containers:
    - name: dataplane
      image: sketchgallery-dataplane:latest
      imagePullPolicy: IfNotPresent
      ports:
        - containerPort: 8080
      env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8080"
        - name: DATAPLANE_DATA_ROOT
          value: /data/objects
        - name: DATAPLANE_PUBLIC_BASE_URL
          value: http://sketchgallery-dataplane:8080
      volumeMounts:
        - name: dataplane-storage
          mountPath: /data/objects
      readinessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 5
        periodSeconds: 5
      livenessProbe:
        httpGet:
          path: /health
          port: 8080
        initialDelaySeconds: 15
        periodSeconds: 10
  volumes:
    - name: dataplane-storage
      persistentVolumeClaim:
        claimName: sketchgallery-dataplane-pvc
